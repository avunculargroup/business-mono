[build]
builder = "dockerfile"
dockerfilePath = "apps/agents/Dockerfile"

# --max-old-space-size gives V8 explicit heap headroom instead of letting it
# auto-size to ~256 MB (the ceiling the OOM crashes hit at baseline). 512 MB
# assumes the Railway service has at least ~1 GB RAM — set it below the
# container's memory limit, or the OS OOM-killer will SIGKILL the process
# (a harder failure than a V8 heap error). Lower this if the instance is smaller.
[deploy]
startCommand = "node --max-old-space-size=512 .mastra/output/index.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
