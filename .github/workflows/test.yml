name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Typecheck, lint, and unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Unit + integration tests across the monorepo (turbo run test):
      # apps/agents (external services mocked at the module boundary) and
      # apps/web (pure utility coverage). No secrets are required. LLM-
      # touching evals (apps/agents/test:eval) are NOT run here — invoke
      # them on-demand locally.
      - name: Test
        run: pnpm test
