name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  migrations:
    name: Check migration versions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      # Fails if two migrations share a 14-digit version prefix (the
      # schema_migrations primary key) or a filename is malformed. A collision
      # silently breaks `supabase db push`; see docs/schema-changes.md 2026-07-20.
      - name: Check migration version prefixes are unique
        run: bash scripts/check-migration-versions.sh

  test:
    name: Typecheck, lint, and unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Unit + integration tests across the monorepo (turbo run test):
      # apps/agents (external services mocked at the module boundary) and
      # apps/web (pure utility coverage). No secrets are required. LLM-
      # touching evals (apps/agents/test:eval) are NOT run here — invoke
      # them on-demand locally.
      - name: Test
        run: pnpm test

  build:
    name: Build agents deploy bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs `mastra build` (the Railway deploy path) so bundler/deployer
      # breaks are caught pre-merge — typecheck and tests don't exercise it.
      # Mirrors apps/agents/Dockerfile: turbo builds workspace deps first,
      # then the Mastra deployer bundles + installs externals. No secrets
      # required (index.ts's runtime env is not evaluated at build time).
      - name: Build agents
        run: pnpm exec turbo run build --filter=@platform/agents...
