name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Apply migrations
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the regenerated types file back to main

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID --password $SUPABASE_DB_PASSWORD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Repair remote-only migration versions
        run: |
          # Find any remote versions that have no local file and mark them reverted.
          # This handles stale entries from renamed/removed migration files so that
          # supabase db push does not abort with "Remote migration versions not found".
          MIGRATION_OUTPUT=$(supabase migration list 2>&1) || true
          ALL_VERSIONS=$(echo "$MIGRATION_OUTPUT" | grep -oE '[0-9]{14}' | sort -u)
          for version in $ALL_VERSIONS; do
            if ! ls supabase/migrations/${version}_*.sql >/dev/null 2>&1; then
              echo "Repairing remote-only version: $version"
              supabase migration repair --status reverted "$version" 2>&1 || true
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Regenerate TypeScript types
        run: |
          supabase gen types typescript \
            --project-id $SUPABASE_PROJECT_ID \
            --schema public \
            > packages/db/src/types/database.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Commit updated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/db/src/types/database.ts
          if git diff --cached --quiet; then
            echo "Types unchanged — nothing to commit"
          else
            git commit -m "chore: regenerate Supabase types [skip ci]"
            git push
          fi
