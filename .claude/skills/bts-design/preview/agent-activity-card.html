<!doctype html>
<html><head><meta charset="utf-8"><title>Agent activity card</title>
<link rel="stylesheet" href="_base.css">

</head><body>
<div style="background: var(--color-surface); border:1px solid var(--color-border); border-radius:8px; padding:16px; border-left:3px solid var(--color-warning); max-width:500px;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
    <div style="font-family: var(--font-body); font-size:12px; font-weight:600; background: var(--color-accent-light); color: var(--color-accent-dark); padding:2px 8px; border-radius:10px;">Simon</div>
    <div style="font-family: var(--font-mono); font-size:11px; color: var(--color-text-tertiary);">22 Mar · 14:32</div>
  </div>
  <div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color: var(--color-text-tertiary); margin-bottom:4px;">Proposed 3 actions</div>
  <div style="font-size:14px; font-weight:500; color: var(--color-text-primary); margin-bottom:8px;">After the Marcus Chen call, three follow-ups are ready for review.</div>
  <ul style="list-style:none; padding:0; display:flex; flex-direction:column; gap:6px;">
    <li style="font-size:13px; padding:6px 10px; background: var(--color-surface-subtle); border-radius:4px;">Draft follow-up email to Marcus <span style="color:var(--color-text-tertiary); font-size:11px;">(contacts)</span></li>
    <li style="font-size:13px; padding:6px 10px; background: var(--color-surface-subtle); border-radius:4px;">Create task: send treasury primer <span style="color:var(--color-text-tertiary); font-size:11px;">(tasks)</span></li>
  </ul>
</div>
<div style="font-size:11px; color: var(--color-text-tertiary); margin-top:10px;">Warning left-border · surface · 16px padding · agent badge + mono timestamp</div></body></html>
