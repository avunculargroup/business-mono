<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_base.css">
<style></style>
</head><body>
<style>
.field { display:flex; flex-direction:column; gap:4px; max-width:320px; }
.field label { font-family: var(--font-body); font-size:13px; font-weight:500; }
.field input { height:36px; padding:0 12px; border:1px solid var(--color-border); border-radius:6px; background: var(--color-surface); font-family: var(--font-body); font-size:15px; color: var(--color-text-primary); outline:none; }
.field input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
.field .help { font-size:12px; color: var(--color-text-secondary); }
.field.error input { border-color: var(--color-destructive); }
.field.error .help { color: var(--color-destructive); }
</style>
<div style="display:flex; gap:14px; flex-wrap:wrap;">
  <div class="field"><label>Company name</label><input value="Dorian Trust Pty Ltd"/><span class="help">As it appears on ATO records</span></div>
  <div class="field error"><label>Allocation</label><input value="120%"/><span class="help">Must be between 0 and 100</span></div>
</div></body></html>
