<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_base.css">
<style></style>
</head><body><div class="swatch-row">
  <div class="swatch"><div class="chip" style="background:#FAFAF8"></div><div class="label">Background</div><div class="hex">--color-bg</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF; border:1px solid var(--color-border)"></div><div class="label">Surface</div><div class="hex">--color-surface</div></div>
  <div class="swatch"><div class="chip" style="background:#F4F4F1"></div><div class="label">Surface subtle</div><div class="hex">--color-surface-subtle</div></div>
  <div class="swatch"><div class="chip" style="background:#E8E6E0"></div><div class="label">Border</div><div class="hex">--color-border</div></div>
  <div class="swatch"><div class="chip" style="background:#9E9C96"></div><div class="label">Text tertiary</div><div class="hex">--color-text-tertiary</div></div>
  <div class="swatch"><div class="chip" style="background:#6B6860"></div><div class="label">Text secondary</div><div class="hex">--color-text-secondary</div></div>
  <div class="swatch"><div class="chip" style="background:#1A1915"></div><div class="label">Text primary</div><div class="hex">--color-text-primary</div></div>
</div></body></html>
